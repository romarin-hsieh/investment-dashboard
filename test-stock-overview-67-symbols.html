<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockOverview 67 符號測試</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        .test-result { margin: 10px 0; padding: 8px; border-radius: 3px; }
        .pass { background-color: #d4edda; color: #155724; }
        .fail { background-color: #f8d7da; color: #721c24; }
        button { padding: 8px 16px; margin: 5px; border: none; border-radius: 3px; cursor: pointer; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-warning { background-color: #ffc107; color: black; }
        .btn-danger { background-color: #dc3545; color: white; }
    </style>
</head>
<body>
    <h1>🎯 StockOverview 67 符號數據測試</h1>
    
    <div class="test-section info">
        <h2>📋 測試目標</h2>
        <p>驗證 StockOverview 頁面能正確載入並顯示所有 67 個股票：</p>
        <ul>
            <li>✅ 統一配置 <code>config/stocks.json</code> 有 67 個股票</li>
            <li>✅ Quotes 數據 <code>quotes/latest.json</code> 有 67 個股票</li>
            <li>✅ Daily 數據 <code>daily/2025-12-28.json</code> 有 67 個股票</li>
            <li>✅ Metadata 數據包含所有股票信息</li>
            <li>🎯 StockOverview 頁面正確顯示所有股票包括 RR</li>
        </ul>
    </div>

    <div class="test-section">
        <h2>🔧 測試控制</h2>
        <button class="btn-primary" onclick="runAllTests()">執行所有測試</button>
        <button class="btn-success" onclick="testDataFiles()">測試數據文件</button>
        <button class="btn-success" onclick="testStockOverviewData()">測試 StockOverview 數據載入</button>
        <button class="btn-danger" onclick="clearAllCaches()">清除所有緩存</button>
        <button class="btn-warning" onclick="clearResults()">清除結果</button>
    </div>

    <div class="test-section">
        <h2>🚀 快速操作</h2>
        <button class="btn-primary" onclick="window.open('/', '_blank')">打開 StockOverview 頁面</button>
        <button class="btn-success" onclick="window.open('/test-unified-stocks-config.html', '_blank')">打開統一配置測試</button>
    </div>

    <div id="test-results"></div>

    <script>
        window.runAllTests = async function() {
            clearResults();
            addResult('info', '🚀 開始執行所有測試...');
            
            await testDataFiles();
            await testStockOverviewData();
            await testRRSymbolSpecific();
            
            addResult('info', '✅ 所有測試完成！');
        }

        window.testDataFiles = async function() {
            addResult('info', '📁 測試數據文件...');
            
            try {
                // 測試統一配置
                const configResponse = await fetch('/config/stocks.json?t=' + Date.now());
                const config = await configResponse.json();
                addResult('pass', `✅ 統一配置: ${config.stocks.length} 個股票`);
                
                // 測試 quotes 數據
                const quotesResponse = await fetch('/data/quotes/latest.json?t=' + Date.now());
                const quotes = await quotesResponse.json();
                addResult('pass', `✅ Quotes 數據: ${quotes.items.length} 個股票`);
                
                // 測試 daily 數據
                const dailyResponse = await fetch('/data/daily/2025-12-28.json?t=' + Date.now());
                const daily = await dailyResponse.json();
                addResult('pass', `✅ Daily 數據: ${daily.universe.length} 個股票`);
                
                // 測試 metadata
                const metadataResponse = await fetch('/data/symbols_metadata.json?t=' + Date.now());
                const metadata = await metadataResponse.json();
                addResult('pass', `✅ Metadata: ${metadata.items.length} 個股票`);
                
                // 檢查數據一致性
                const configSymbols = config.stocks.filter(s => s.enabled).map(s => s.symbol).sort();
                const quotesSymbols = quotes.items.map(q => q.symbol).sort();
                const dailySymbols = daily.universe.sort();
                
                if (configSymbols.length === quotesSymbols.length && 
                    configSymbols.length === dailySymbols.length) {
                    addResult('pass', `✅ 數據一致性檢查通過: 所有文件都有 ${configSymbols.length} 個股票`);
                } else {
                    addResult('fail', `❌ 數據不一致: Config(${configSymbols.length}), Quotes(${quotesSymbols.length}), Daily(${dailySymbols.length})`);
                }
                
                // 檢查 RR 符號
                const rrInConfig = configSymbols.includes('RR');
                const rrInQuotes = quotesSymbols.includes('RR');
                const rrInDaily = dailySymbols.includes('RR');
                
                if (rrInConfig && rrInQuotes && rrInDaily) {
                    addResult('pass', '✅ RR 符號在所有數據文件中都存在');
                } else {
                    addResult('fail', `❌ RR 符號缺失: Config(${rrInConfig}), Quotes(${rrInQuotes}), Daily(${rrInDaily})`);
                }
                
            } catch (error) {
                addResult('fail', '❌ 數據文件測試失敗: ' + error.message);
            }
        }

        window.testStockOverviewData = async function() {
            addResult('info', '🔧 測試 StockOverview 數據載入...');
            
            try {
                // 模擬 StockOverview 的數據載入邏輯
                
                // 1. 載入統一配置
                let stocksConfig;
                try {
                    const module = await import('/src/utils/stocksConfigService.js');
                    stocksConfig = module.stocksConfig;
                    addResult('pass', '✅ stocksConfigService 載入成功');
                } catch (error) {
                    addResult('fail', '❌ stocksConfigService 載入失敗: ' + error.message);
                    return;
                }
                
                // 2. 獲取配置的符號
                const configuredSymbols = await stocksConfig.getEnabledSymbols();
                addResult('pass', `✅ 配置符號: ${configuredSymbols.length} 個`);
                
                // 3. 載入 quotes 數據
                const quotesResponse = await fetch('/data/quotes/latest.json?t=' + Date.now());
                const quotesData = await quotesResponse.json();
                
                // 4. 過濾 quotes 只顯示配置的符號
                const filteredQuotes = quotesData.items.filter(quote => 
                    configuredSymbols.includes(quote.symbol)
                );
                addResult('pass', `✅ 過濾後的 quotes: ${filteredQuotes.length} 個`);
                
                // 5. 載入 daily 數據
                const dailyResponse = await fetch('/data/daily/2025-12-28.json?t=' + Date.now());
                const dailyData = await dailyResponse.json();
                addResult('pass', `✅ Daily 數據載入: ${dailyData.universe.length} 個符號`);
                
                // 6. 載入 metadata
                const metadataResponse = await fetch('/data/symbols_metadata.json?t=' + Date.now());
                const metadataData = await metadataResponse.json();
                addResult('pass', `✅ Metadata 載入: ${metadataData.items.length} 個符號`);
                
                // 7. 檢查 RR 符號的完整數據鏈
                const rrQuote = filteredQuotes.find(q => q.symbol === 'RR');
                const rrDaily = dailyData.per_symbol?.find(d => d.symbol === 'RR');
                const rrMetadata = metadataData.items.find(m => m.symbol === 'RR');
                
                if (rrQuote) {
                    addResult('pass', `✅ RR Quote 數據: $${rrQuote.price_usd}`);
                } else {
                    addResult('fail', '❌ RR Quote 數據缺失');
                }
                
                if (rrDaily) {
                    addResult('pass', '✅ RR Daily 數據存在');
                } else {
                    addResult('fail', '❌ RR Daily 數據缺失');
                }
                
                if (rrMetadata) {
                    addResult('pass', `✅ RR Metadata: ${rrMetadata.sector} / ${rrMetadata.industry}`);
                } else {
                    addResult('fail', '❌ RR Metadata 缺失');
                }
                
                // 8. 模擬分組邏輯
                const groups = {};
                filteredQuotes.forEach(quote => {
                    const symbolMetadata = metadataData.items.find(m => m.symbol === quote.symbol);
                    const sector = (symbolMetadata && symbolMetadata.confidence >= 0.7) 
                        ? symbolMetadata.sector || 'Unknown' 
                        : 'Unknown';
                    
                    if (!groups[sector]) {
                        groups[sector] = [];
                    }
                    groups[sector].push(quote.symbol);
                });
                
                addResult('pass', `✅ 分組結果: ${Object.keys(groups).length} 個 sectors`);
                
                // 檢查 RR 是否在 Technology 分組
                const techGroup = groups['Technology'] || [];
                if (techGroup.includes('RR')) {
                    addResult('pass', '✅ RR 正確歸類在 Technology sector');
                } else {
                    addResult('fail', `❌ RR 未在 Technology sector，當前分組: ${JSON.stringify(groups)}`);
                }
                
                // 顯示所有分組統計
                Object.entries(groups).forEach(([sector, symbols]) => {
                    addResult('info', `📊 ${sector}: ${symbols.length} 個股票`);
                });
                
            } catch (error) {
                addResult('fail', '❌ StockOverview 數據載入測試失敗: ' + error.message);
            }
        }

        window.testRRSymbolSpecific = async function() {
            addResult('info', '🎯 RR 符號專項測試...');
            
            try {
                // 檢查 RR 在所有數據源中的存在
                const sources = [
                    { name: 'Config', url: '/config/stocks.json', path: 'stocks', filter: s => s.symbol === 'RR' },
                    { name: 'Quotes', url: '/data/quotes/latest.json', path: 'items', filter: q => q.symbol === 'RR' },
                    { name: 'Daily', url: '/data/daily/2025-12-28.json', path: 'universe', filter: s => s === 'RR' },
                    { name: 'Metadata', url: '/data/symbols_metadata.json', path: 'items', filter: m => m.symbol === 'RR' }
                ];
                
                for (const source of sources) {
                    const response = await fetch(source.url + '?t=' + Date.now());
                    const data = await response.json();
                    const items = source.path.split('.').reduce((obj, key) => obj[key], data);
                    const found = Array.isArray(items) ? items.find(source.filter) : items === 'RR';
                    
                    if (found) {
                        addResult('pass', `✅ RR 在 ${source.name} 中存在`);
                        if (typeof found === 'object') {
                            addResult('info', `   詳情: ${JSON.stringify(found, null, 2)}`);
                        }
                    } else {
                        addResult('fail', `❌ RR 在 ${source.name} 中不存在`);
                    }
                }
                
            } catch (error) {
                addResult('fail', '❌ RR 符號專項測試失敗: ' + error.message);
            }
        }

        window.clearAllCaches = function() {
            addResult('info', '🗑️ 清除所有緩存...');
            
            // 清除 sessionStorage 中的緩存標記
            sessionStorage.setItem('force_reload_stock_overview', Date.now().toString());
            sessionStorage.setItem('emergency_fix_applied', Date.now().toString());
            
            // 清除 localStorage
            localStorage.clear();
            
            addResult('pass', '✅ 緩存清除完成');
            addResult('info', '💡 請刷新 StockOverview 頁面以應用清除的緩存');
        }

        window.clearResults = function() {
            document.getElementById('test-results').innerHTML = '';
        }

        function addResult(type, message) {
            const resultsDiv = document.getElementById('test-results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `test-result ${type}`;
            resultDiv.innerHTML = `<pre>${message}</pre>`;
            resultsDiv.appendChild(resultDiv);
            
            // 自動滾動到底部
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        }

        // 頁面載入時自動執行基本測試
        window.addEventListener('load', function() {
            addResult('info', '🎯 StockOverview 67 符號數據測試工具已載入');
            addResult('info', '點擊 "執行所有測試" 開始完整測試');
        });
    </script>
</body>
</html>
