<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path Consistency Fix Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>🔍 Path Consistency Fix Test</h1>
    <p>Testing the unified baseUrl helper and path resolution across all services.</p>

    <div class="test-section info">
        <h2>📊 Environment Information</h2>
        <div id="env-info">Loading...</div>
    </div>

    <div class="test-section">
        <h2>🛠️ Base URL Helper Test</h2>
        <div id="baseurl-test">Loading...</div>
    </div>

    <div class="test-section">
        <h2>📁 Path Generation Test</h2>
        <div id="paths-test">Loading...</div>
    </div>

    <div class="test-section">
        <h2>🌐 Service Integration Test</h2>
        <div id="services-test">Loading...</div>
    </div>

    <div class="test-section">
        <h2>📊 Data Availability Test</h2>
        <div id="data-test">Loading...</div>
    </div>

    <script type="module">
        // Test the unified baseUrl helper
        async function testBaseUrlHelper() {
            try {
                const { withBase, paths, getEnvironmentInfo, debugPaths } = await import('./src/utils/baseUrl.js');
                
                // Environment info
                const envInfo = getEnvironmentInfo();
                document.getElementById('env-info').innerHTML = `
                    <pre>${JSON.stringify(envInfo, null, 2)}</pre>
                `;

                // Base URL helper test
                const testPaths = [
                    'data/ohlcv/AAPL.json',
                    'config/universe.json',
                    'data/technical-indicators/latest_index.json'
                ];

                let baseUrlResults = '<h3>withBase() Function Test:</h3>';
                testPaths.forEach(path => {
                    const result = withBase(path);
                    baseUrlResults += `<div class="test-result success">✅ ${path} → ${result}</div>`;
                });

                document.getElementById('baseurl-test').innerHTML = baseUrlResults;

                // Paths helper test
                let pathsResults = '<h3>Paths Helper Test:</h3>';
                const pathTests = [
                    { name: 'OHLCV (AAPL)', func: () => paths.ohlcv('AAPL') },
                    { name: 'OHLCV Precomputed (aapl)', func: () => paths.ohlcvPrecomputed('aapl') },
                    { name: 'OHLCV Index', func: () => paths.ohlcvIndex() },
                    { name: 'Technical Indicators Index', func: () => paths.technicalIndicatorsIndex() },
                    { name: 'Symbols Metadata', func: () => paths.symbolsMetadata() },
                    { name: 'Universe Config', func: () => paths.universe() },
                    { name: 'Package JSON', func: () => paths.packageJson() }
                ];

                pathTests.forEach(test => {
                    try {
                        const result = test.func();
                        pathsResults += `<div class="test-result success">✅ ${test.name}: ${result}</div>`;
                    } catch (error) {
                        pathsResults += `<div class="test-result error">❌ ${test.name}: ${error.message}</div>`;
                    }
                });

                document.getElementById('paths-test').innerHTML = pathsResults;

                // Debug paths
                debugPaths();

            } catch (error) {
                document.getElementById('baseurl-test').innerHTML = `
                    <div class="test-result error">❌ Failed to load baseUrl helper: ${error.message}</div>
                `;
            }
        }

        // Test service integration
        async function testServiceIntegration() {
            let results = '<h3>Service Integration Results:</h3>';

            // Test services that use the unified paths
            const serviceTests = [
                {
                    name: 'OHLCV API',
                    test: async () => {
                        const { ohlcvApi } = await import('./src/services/ohlcvApi.js');
                        return await ohlcvApi.isLocalAvailable('AAPL');
                    }
                },
                {
                    name: 'Precomputed OHLCV API',
                    test: async () => {
                        const { precomputedOhlcvApi } = await import('./src/api/precomputedOhlcvApi.js');
                        const symbols = await precomputedOhlcvApi.getAvailableSymbols();
                        return Array.isArray(symbols);
                    }
                },
                {
                    name: 'Direct Metadata Loader',
                    test: async () => {
                        const { directMetadataLoader } = await import('./src/utils/directMetadataLoader.js');
                        const metadata = await directMetadataLoader.getSymbolMetadata('AAPL');
                        return metadata && metadata.symbol === 'AAPL';
                    }
                },
                {
                    name: 'Static Sector Industry Service',
                    test: async () => {
                        const { staticSectorIndustryService } = await import('./src/utils/staticSectorIndustryService.js');
                        const stats = await staticSectorIndustryService.getDataStats();
                        return stats && typeof stats.totalSymbols === 'number';
                    }
                }
            ];

            for (const serviceTest of serviceTests) {
                try {
                    const result = await serviceTest.test();
                    if (result) {
                        results += `<div class="test-result success">✅ ${serviceTest.name}: Working correctly</div>`;
                    } else {
                        results += `<div class="test-result error">❌ ${serviceTest.name}: Test failed</div>`;
                    }
                } catch (error) {
                    results += `<div class="test-result error">❌ ${serviceTest.name}: ${error.message}</div>`;
                }
            }

            document.getElementById('services-test').innerHTML = results;
        }

        // Test data availability
        async function testDataAvailability() {
            let results = '<h3>Data Availability Results:</h3>';

            const { paths } = await import('./src/utils/baseUrl.js');
            
            const dataTests = [
                { name: 'OHLCV Index', url: paths.ohlcvIndex() },
                { name: 'Technical Indicators Index', url: paths.technicalIndicatorsIndex() },
                { name: 'Symbols Metadata', url: paths.symbolsMetadata() },
                { name: 'Universe Config', url: paths.universe() },
                { name: 'Package JSON', url: paths.packageJson() },
                { name: 'Sample OHLCV (AAPL)', url: paths.ohlcv('AAPL') }
            ];

            for (const test of dataTests) {
                try {
                    const response = await fetch(test.url);
                    if (response.ok) {
                        const contentType = response.headers.get('content-type');
                        const size = response.headers.get('content-length') || 'unknown';
                        results += `<div class="test-result success">✅ ${test.name}: Available (${size} bytes, ${contentType})</div>`;
                    } else {
                        results += `<div class="test-result error">❌ ${test.name}: HTTP ${response.status} ${response.statusText}</div>`;
                    }
                } catch (error) {
                    results += `<div class="test-result error">❌ ${test.name}: ${error.message}</div>`;
                }
            }

            document.getElementById('data-test').innerHTML = results;
        }

        // Run all tests
        async function runAllTests() {
            console.log('🚀 Starting path consistency tests...');
            
            await testBaseUrlHelper();
            await testServiceIntegration();
            await testDataAvailability();
            
            console.log('✅ All tests completed');
        }

        // Start tests when page loads
        runAllTests().catch(error => {
            console.error('❌ Test execution failed:', error);
            document.body.innerHTML += `
                <div class="test-section error">
                    <h2>❌ Test Execution Failed</h2>
                    <pre>${error.message}\n${error.stack}</pre>
                </div>
            `;
        });
    </script>
</body>
</html>
