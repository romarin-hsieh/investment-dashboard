<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YFinance API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>YFinance API Test</h1>
    <button onclick="testAPI()">Test API</button>
    <div id="results"></div>

    <script>
        async function testAPI() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="result">Testing...</div>';

            try {
                // Test 1: Direct API call to precomputed data
                console.log('🧪 Testing direct API call...');
                const response = await fetch('https://romarin-hsieh.github.io/investment-dashboard/data/technical-indicators/2026-01-01_NVDA.json');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                let html = '<div class="result success">✅ Direct API call successful</div>';
                
                // Check for yfinance data
                if (data.indicators && data.indicators.yf) {
                    html += '<div class="result success">✅ YFinance data found in response</div>';
                    html += '<h3>YFinance Data:</h3>';
                    html += `<pre>${JSON.stringify(data.indicators.yf, null, 2)}</pre>`;
                } else {
                    html += '<div class="result error">❌ No YFinance data found in response</div>';
                }

                html += '<h3>Full Response Structure:</h3>';
                html += `<pre>${JSON.stringify({
                    symbol: data.symbol,
                    hasIndicators: !!data.indicators,
                    indicatorKeys: data.indicators ? Object.keys(data.indicators) : 'none',
                    hasYF: !!(data.indicators && data.indicators.yf),
                    metadata: data.metadata
                }, null, 2)}</pre>`;

                resultsDiv.innerHTML = html;

            } catch (error) {
                console.error('Test failed:', error);
                resultsDiv.innerHTML = `<div class="result error">❌ Test failed: ${error.message}</div>`;
            }
        }

        // Auto-run test
        testAPI();
    </script>
</body>
</html>
