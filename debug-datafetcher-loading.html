<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataFetcher 載入診斷</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        .warning { background-color: #fff3cd; border-color: #ffeaa7; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        .test-result { margin: 10px 0; padding: 8px; border-radius: 3px; }
        .pass { background-color: #d4edda; color: #155724; }
        .fail { background-color: #f8d7da; color: #721c24; }
        button { padding: 8px 16px; margin: 5px; border: none; border-radius: 3px; cursor: pointer; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-warning { background-color: #ffc107; color: black; }
        .btn-danger { background-color: #dc3545; color: white; }
        .timing { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>🔍 DataFetcher 載入診斷</h1>
    
    <div class="test-section info">
        <h2>📋 診斷目標</h2>
        <p>檢查 dataFetcher 的載入流程是否有卡住的問題：</p>
        <ul>
            <li>🎯 檢查 status.json 載入時間</li>
            <li>🎯 檢查 quotes/latest.json 載入時間</li>
            <li>🎯 檢查 daily snapshot 載入時間</li>
            <li>🎯 檢查緩存破壞邏輯</li>
            <li>🎯 識別載入瓶頸</li>
        </ul>
    </div>

    <div class="test-section">
        <h2>🔧 測試控制</h2>
        <button class="btn-primary" onclick="runAllTests()">執行所有診斷</button>
        <button class="btn-success" onclick="testStatusJson()">測試 status.json</button>
        <button class="btn-success" onclick="testQuotesSnapshot()">測試 quotes 載入</button>
        <button class="btn-success" onclick="testDailySnapshot()">測試 daily 載入</button>
        <button class="btn-warning" onclick="testDirectFetch()">測試直接載入 (跳過 status)</button>
        <button class="btn-danger" onclick="clearResults()">清除結果</button>
    </div>

    <div id="test-results"></div>

    <script type="module">
        let dataFetcher;
        
        // 動態載入 dataFetcher
        try {
            const module = await import('/src/lib/fetcher.ts');
            dataFetcher = module.dataFetcher;
            console.log('✅ DataFetcher loaded successfully');
        } catch (error) {
            console.error('❌ Failed to load DataFetcher:', error);
            addResult('fail', '無法載入 DataFetcher: ' + error.message);
        }

        window.runAllTests = async function() {
            clearResults();
            addResult('info', '🚀 開始執行 DataFetcher 載入診斷...');
            
            await testStatusJson();
            await testQuotesSnapshot();
            await testDailySnapshot();
            await testDirectFetch();
            await testCacheBusting();
            
            addResult('info', '✅ 所有診斷完成！');
        }

        window.testStatusJson = async function() {
            addResult('info', '📊 測試 status.json 載入...');
            
            const startTime = performance.now();
            
            try {
                const response = await fetch('/data/status.json?t=' + Date.now());
                const loadTime = performance.now() - startTime;
                
                if (response.ok) {
                    const data = await response.json();
                    addResult('pass', `✅ status.json 載入成功 (${loadTime.toFixed(2)}ms)`);
                    addResult('info', `   最後更新: ${data.last_updated}`);
                    addResult('info', `   系統狀態: ${data.system_status}`);
                    addResult('info', `   符號數量: ${data.jobs.hourly_quotes.symbols_updated}`);
                    
                    // 檢查時間戳是否合理
                    const lastUpdated = new Date(data.last_updated);
                    const now = new Date();
                    const ageHours = (now.getTime() - lastUpdated.getTime()) / (1000 * 60 * 60);
                    
                    if (ageHours < 24) {
                        addResult('pass', `✅ 時間戳合理 (${ageHours.toFixed(1)} 小時前)`);
                    } else {
                        addResult('warning', `⚠️ 時間戳較舊 (${ageHours.toFixed(1)} 小時前)`);
                    }
                } else {
                    addResult('fail', `❌ status.json 載入失敗: HTTP ${response.status} (${loadTime.toFixed(2)}ms)`);
                }
            } catch (error) {
                const loadTime = performance.now() - startTime;
                addResult('fail', `❌ status.json 載入錯誤: ${error.message} (${loadTime.toFixed(2)}ms)`);
            }
        }

        window.testQuotesSnapshot = async function() {
            addResult('info', '📈 測試 quotes snapshot 載入...');
            
            if (!dataFetcher) {
                addResult('fail', '❌ DataFetcher 未載入');
                return;
            }
            
            const startTime = performance.now();
            
            try {
                const result = await dataFetcher.fetchQuotesSnapshot();
                const loadTime = performance.now() - startTime;
                
                if (result.data) {
                    addResult('pass', `✅ Quotes 載入成功 (${loadTime.toFixed(2)}ms)`);
                    addResult('info', `   數據來源: ${result.source}`);
                    addResult('info', `   新鮮度: ${result.stale_level}`);
                    addResult('info', `   符號數量: ${result.data.items.length}`);
                    addResult('info', `   最後更新: ${result.as_of}`);
                    
                    // 檢查是否包含 RR
                    const hasRR = result.data.items.some(item => item.symbol === 'RR');
                    if (hasRR) {
                        addResult('pass', '✅ 包含 RR 符號');
                    } else {
                        addResult('warning', '⚠️ 不包含 RR 符號');
                    }
                } else {
                    addResult('fail', `❌ Quotes 載入失敗 (${loadTime.toFixed(2)}ms)`);
                    if (result.error) {
                        addResult('fail', `   錯誤: ${result.error}`);
                    }
                }
            } catch (error) {
                const loadTime = performance.now() - startTime;
                addResult('fail', `❌ Quotes 載入異常: ${error.message} (${loadTime.toFixed(2)}ms)`);
            }
        }

        window.testDailySnapshot = async function() {
            addResult('info', '📅 測試 daily snapshot 載入...');
            
            if (!dataFetcher) {
                addResult('fail', '❌ DataFetcher 未載入');
                return;
            }
            
            const startTime = performance.now();
            
            try {
                const result = await dataFetcher.fetchDailySnapshot();
                const loadTime = performance.now() - startTime;
                
                if (result.data) {
                    addResult('pass', `✅ Daily 載入成功 (${loadTime.toFixed(2)}ms)`);
                    addResult('info', `   數據來源: ${result.source}`);
                    addResult('info', `   新鮮度: ${result.stale_level}`);
                    addResult('info', `   符號數量: ${result.data.universe.length}`);
                    addResult('info', `   生成時間: ${result.as_of}`);
                } else {
                    addResult('fail', `❌ Daily 載入失敗 (${loadTime.toFixed(2)}ms)`);
                    if (result.error) {
                        addResult('fail', `   錯誤: ${result.error}`);
                    }
                }
            } catch (error) {
                const loadTime = performance.now() - startTime;
                addResult('fail', `❌ Daily 載入異常: ${error.message} (${loadTime.toFixed(2)}ms)`);
            }
        }

        window.testDirectFetch = async function() {
            addResult('info', '🚀 測試直接載入 (跳過 status.json)...');
            
            const tests = [
                { name: 'quotes/latest.json', url: '/data/quotes/latest.json' },
                { name: 'daily/2025-12-28.json', url: '/data/daily/2025-12-28.json' },
                { name: 'symbols_metadata.json', url: '/data/symbols_metadata.json' }
            ];
            
            for (const test of tests) {
                const startTime = performance.now();
                
                try {
                    const response = await fetch(test.url + '?t=' + Date.now());
                    const loadTime = performance.now() - startTime;
                    
                    if (response.ok) {
                        const data = await response.json();
                        let itemCount = 0;
                        
                        if (data.items) itemCount = data.items.length;
                        else if (data.universe) itemCount = data.universe.length;
                        else if (data.stocks) itemCount = data.stocks.length;
                        
                        addResult('pass', `✅ ${test.name} 直接載入成功 (${loadTime.toFixed(2)}ms, ${itemCount} 項目)`);
                    } else {
                        addResult('fail', `❌ ${test.name} 直接載入失敗: HTTP ${response.status} (${loadTime.toFixed(2)}ms)`);
                    }
                } catch (error) {
                    const loadTime = performance.now() - startTime;
                    addResult('fail', `❌ ${test.name} 直接載入錯誤: ${error.message} (${loadTime.toFixed(2)}ms)`);
                }
            }
        }

        window.testCacheBusting = async function() {
            addResult('info', '🗑️ 測試緩存破壞邏輯...');
            
            try {
                // 測試不同的緩存破壞參數
                const timestamp1 = Date.now();
                const timestamp2 = timestamp1 + 1000;
                
                const tests = [
                    { name: '無緩存破壞', url: '/data/quotes/latest.json' },
                    { name: '時間戳緩存破壞', url: `/data/quotes/latest.json?t=${timestamp1}` },
                    { name: '不同時間戳', url: `/data/quotes/latest.json?t=${timestamp2}` }
                ];
                
                for (const test of tests) {
                    const startTime = performance.now();
                    const response = await fetch(test.url);
                    const loadTime = performance.now() - startTime;
                    
                    if (response.ok) {
                        addResult('pass', `✅ ${test.name}: ${loadTime.toFixed(2)}ms`);
                    } else {
                        addResult('fail', `❌ ${test.name}: HTTP ${response.status} (${loadTime.toFixed(2)}ms)`);
                    }
                }
                
                // 檢查 status.json 的緩存破壞邏輯
                const statusResponse = await fetch('/data/status.json');
                if (statusResponse.ok) {
                    const statusData = await statusResponse.json();
                    const statusTimestamp = new Date(statusData.last_updated).getTime();
                    
                    addResult('info', `📊 Status.json 時間戳: ${statusTimestamp}`);
                    addResult('info', `📊 當前時間戳: ${Date.now()}`);
                    addResult('info', `📊 時間差: ${((Date.now() - statusTimestamp) / 1000 / 60).toFixed(1)} 分鐘`);
                }
                
            } catch (error) {
                addResult('fail', `❌ 緩存破壞測試失敗: ${error.message}`);
            }
        }

        window.clearResults = function() {
            document.getElementById('test-results').innerHTML = '';
        }

        function addResult(type, message) {
            const resultsDiv = document.getElementById('test-results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `test-result ${type}`;
            resultDiv.innerHTML = `<pre>${message}</pre>`;
            resultsDiv.appendChild(resultDiv);
            
            // 自動滾動到底部
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        }

        // 頁面載入時自動執行基本測試
        window.addEventListener('load', function() {
            addResult('info', '🔍 DataFetcher 載入診斷工具已載入');
            addResult('info', '點擊 "執行所有診斷" 開始檢查載入問題');
        });
    </script>
</body>
</html>
