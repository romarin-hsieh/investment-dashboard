<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最終 YFinance 修復方案</title>
    <style>
        body { font-family: system-ui; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .step { background: #f8f9fa; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 4px solid #007bff; }
        .success { border-left-color: #28a745; background: #d4edda; }
        .error { border-left-color: #dc3545; background: #f8d7da; }
        .warning { border-left-color: #ffc107; background: #fff3cd; }
        button { padding: 12px 24px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
        button:hover { background: #218838; }
        .test-btn { background: #007bff; }
        .test-btn:hover { background: #0056b3; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🎯 最終 YFinance 修復方案</h1>
    
    <div class="step error">
        <h3>問題確認</h3>
        <p>✅ 伺服器數據正確：JSON 包含 yf 欄位</p>
        <p>❌ 前端顯示失敗：只顯示 12 個技術指標，缺少 6 個 YFinance 指標</p>
        <p>❌ 數據流中斷：前端無法正確處理 indicators.yf 數據</p>
    </div>

    <div class="step warning">
        <h3>根本原因</h3>
        <p>前端 Vue.js 組件的指標渲染邏輯有問題，無法正確處理 yf 數據結構</p>
    </div>

    <div class="step">
        <h3>解決方案</h3>
        <p>直接修改前端 JavaScript，強制注入 YFinance 指標到現有的技術指標顯示中</p>
        
        <button onclick="step1()">步驟 1: 檢測當前狀態</button>
        <button onclick="step2()">步驟 2: 注入修復腳本</button>
        <button onclick="step3()" class="test-btn">步驟 3: 測試修復效果</button>
    </div>

    <div id="results"></div>

    <div class="step">
        <h3>測試連結</h3>
        <a href="https://romarin-hsieh.github.io/investment-dashboard/#/stock-overview/symbols/NVDA" target="_blank">
            <button class="test-btn">測試 NVDA</button>
        </a>
        <a href="https://romarin-hsieh.github.io/investment-dashboard/#/stock-overview/symbols/TSLA" target="_blank">
            <button class="test-btn">測試 TSLA</button>
        </a>
    </div>

    <script>
        function log(message, type = 'step') {
            const div = document.createElement('div');
            div.className = type;
            div.innerHTML = '<h4>' + new Date().toLocaleTimeString() + '</h4><p>' + message + '</p>';
            document.getElementById('results').appendChild(div);
        }

        function step1() {
            log('正在檢測當前狀態...', 'step');
            
            // 檢測腳本
            const checkScript = `
                console.log('=== YFinance 狀態檢測 ===');
                
                // 檢查當前頁面
                const currentUrl = window.location.href;
                console.log('當前 URL:', currentUrl);
                
                // 檢查技術指標元素
                const indicators = document.querySelectorAll('[class*="indicator"], [class*="technical"]');
                console.log('找到指標元素數量:', indicators.length);
                
                // 檢查是否在股票頁面
                const isStockPage = currentUrl.includes('/stock-overview/symbols/');
                console.log('是否在股票頁面:', isStockPage);
                
                if (isStockPage) {
                    const symbol = currentUrl.match(/symbols\/([A-Z]+)/)?.[1];
                    console.log('當前股票代碼:', symbol);
                    
                    // 嘗試獲取數據
                    fetch('/investment-dashboard/data/technical-indicators/2026-01-02_' + symbol + '.json')
                        .then(r => r.json())
                        .then(data => {
                            console.log('數據獲取成功:', !!data.indicators?.yf);
                            console.log('YF 數據:', data.indicators?.yf);
                        })
                        .catch(e => console.log('數據獲取失敗:', e));
                }
                
                window.yfCheckComplete = true;
            `;
            
            const script = document.createElement('script');
            script.textContent = checkScript;
            document.head.appendChild(script);
            
            setTimeout(() => {
                log('狀態檢測完成，請查看瀏覽器控制台', 'success');
            }, 1000);
        }

        function step2() {
            log('正在注入修復腳本...', 'step');
            
            const fixScript = `
                // === 最終 YFinance 修復腳本 ===
                (function() {
                    console.log('🚀 最終 YFinance 修復腳本啟動');
                    
                    window.YFINANCE_FIX = {
                        active: true,
                        cache: new Map(),
                        observer: null
                    };
                    
                    // 格式化函數
                    function formatValue(value, type) {
                        if (!value && value !== 0) return 'N/A';
                        
                        switch(type) {
                            case 'volume':
                                if (value >= 1e9) return (value/1e9).toFixed(1) + 'B';
                                if (value >= 1e6) return (value/1e6).toFixed(1) + 'M';
                                return value.toLocaleString();
                            case 'marketCap':
                                if (value >= 1e12) return '$' + (value/1e12).toFixed(2) + 'T';
                                if (value >= 1e9) return '$' + (value/1e9).toFixed(1) + 'B';
                                return '$' + value.toLocaleString();
                            case 'beta':
                                return value.toFixed(2);
                            case 'percent':
                                return (value >= 0 ? '+' : '') + value.toFixed(1) + '%';
                            default:
                                return value.toString();
                        }
                    }
                    
                    // 獲取股票代碼
                    function getSymbol() {
                        const match = window.location.href.match(/symbols\/([A-Z]+)/);
                        return match ? match[1] : null;
                    }
                    
                    // 獲取 YFinance 數據
                    async function getYFData(symbol) {
                        if (!symbol) return null;
                        
                        try {
                            const response = await fetch('/investment-dashboard/data/technical-indicators/2026-01-02_' + symbol + '.json');
                            const data = await response.json();
                            return data.indicators?.yf || null;
                        } catch (error) {
                            console.error('獲取 YF 數據失敗:', error);
                            return null;
                        }
                    }
                    
                    // 創建 YFinance 指標 HTML
                    function createYFIndicators(yfData) {
                        if (!yfData) return '';
                        
                        const indicators = [
                            { label: 'Volume', value: formatValue(yfData.volume_last_day, 'volume'), 
                              change: yfData.volume_last_day_pct ? formatValue(yfData.volume_last_day_pct, 'percent') : null },
                            { label: '5D Avg Volume', value: formatValue(yfData.avg_volume_5d, 'volume'),
                              change: yfData.avg_volume_5d_pct ? formatValue(yfData.avg_volume_5d_pct, 'percent') : null },
                            { label: 'Market Cap', value: formatValue(yfData.market_cap, 'marketCap') },
                            { label: 'Beta (3mo)', value: formatValue(yfData.beta_3mo, 'beta') },
                            { label: 'Beta (1y)', value: formatValue(yfData.beta_1y, 'beta') },
                            { label: 'Beta (5y)', value: formatValue(yfData.beta_5y, 'beta') }
                        ];
                        
                        return indicators.map(ind => \`
                            <div style="background:#fff3cd;padding:15px;border-radius:8px;border-left:4px solid #ffc107;min-height:70px;">
                                <div style="font-size:0.9em;color:#856404;margin-bottom:5px;font-weight:500;">\${ind.label}</div>
                                <div style="display:flex;align-items:center;gap:8px;">
                                    <span style="font-size:1.1em;font-weight:bold;color:#333;">\${ind.value}</span>
                                    \${ind.change ? \`<span style="color:\${ind.change.startsWith('+') ? '#28a745' : '#dc3545'};font-size:0.9em;">(\${ind.change})</span>\` : ''}
                                </div>
                            </div>
                        \`).join('');
                    }
                    
                    // 主要修復函數
                    async function applyFix() {
                        const symbol = getSymbol();
                        if (!symbol) return;
                        
                        console.log('正在修復 YFinance 指標:', symbol);
                        
                        // 獲取數據
                        const yfData = await getYFData(symbol);
                        if (!yfData) {
                            console.log('無法獲取 YF 數據');
                            return;
                        }
                        
                        console.log('YF 數據:', yfData);
                        
                        // 尋找技術指標容器
                        let container = document.querySelector('#app');
                        
                        // 移除舊的修復
                        const oldFix = document.querySelector('.yf-fix-final');
                        if (oldFix) oldFix.remove();
                        
                        // 創建新的指標顯示
                        const yfHTML = createYFIndicators(yfData);
                        const fullHTML = \`
                            <div class="yf-fix-final" style="max-width:1200px;margin:20px auto;padding:20px;background:white;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.1);">
                                <h3 style="margin:0 0 20px 0;color:#333;display:flex;align-items:center;gap:10px;">
                                    📊 YFinance Indicators - \${symbol}
                                    <span style="background:#28a745;color:white;padding:4px 8px;border-radius:4px;font-size:0.7em;">FIXED</span>
                                </h3>
                                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;">
                                    \${yfHTML}
                                    <div style="grid-column:1/-1;background:#d4edda;padding:15px;border-radius:8px;border-left:4px solid #28a745;">
                                        <div style="font-size:0.9em;color:#155724;">
                                            ✅ YFinance 指標修復成功 | 數據來源: 2026-01-02 | 更新時間: \${new Date().toLocaleString()}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        \`;
                        
                        container.insertAdjacentHTML('afterbegin', fullHTML);
                        
                        // 滾動到指標
                        document.querySelector('.yf-fix-final')?.scrollIntoView({ behavior: 'smooth' });
                        
                        console.log('✅ YFinance 指標修復完成');
                    }
                    
                    // 監聽路由變化
                    function setupRouteListener() {
                        let currentUrl = window.location.href;
                        
                        const observer = new MutationObserver(() => {
                            if (window.location.href !== currentUrl) {
                                currentUrl = window.location.href;
                                if (currentUrl.includes('/stock-overview/symbols/')) {
                                    setTimeout(applyFix, 1000);
                                }
                            }
                        });
                        
                        observer.observe(document.body, { childList: true, subtree: true });
                        window.YFINANCE_FIX.observer = observer;
                    }
                    
                    // 立即執行
                    if (window.location.href.includes('/stock-overview/symbols/')) {
                        applyFix();
                    }
                    
                    // 設置監聽
                    setupRouteListener();
                    
                    // 延遲執行
                    setTimeout(applyFix, 1000);
                    setTimeout(applyFix, 3000);
                    
                    console.log('🚀 YFinance 修復腳本載入完成');
                })();
            `;
            
            const script = document.createElement('script');
            script.textContent = fixScript;
            document.head.appendChild(script);
            
            log('修復腳本注入完成！', 'success');
        }

        function step3() {
            log('正在測試修復效果...', 'step');
            
            // 打開測試頁面
            const testUrl = 'https://romarin-hsieh.github.io/investment-dashboard/#/stock-overview/symbols/NVDA';
            window.open(testUrl, '_blank');
            
            log('測試頁面已開啟，請檢查是否顯示 YFinance 指標', 'success');
        }
    </script>
</body>
</html>
