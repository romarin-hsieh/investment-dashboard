name: Weekly Metadata Update

on:
  # Every Sunday at 2:00 UTC
  # 每週日凌晨 2 點執行 (UTC)
  schedule:
    - cron: '0 2 * * 0'
  
  # Manual trigger / 允許手動觸發
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update all metadata'
        required: false
        default: false
        type: boolean

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance requests pandas

    - name: Seed public/data from the data repo
      run: bash scripts/seed-data-from-repo.sh

    - name: Update Sector and Industry Data
      run: |
        echo "🔄 Updating sector and industry data..."
        echo "🔄 更新 Sector 和 Industry 資料..."
        python scripts/update-sector-industry.py
        echo "✅ Sector/Industry update completed"
    
    - name: Update YFinance Metadata
      run: |
        echo "🔄 Updating YFinance metadata..."
        echo "🔄 更新 YFinance Metadata..."
        python scripts/update-metadata-python.py
        echo "✅ Metadata update completed"
    
    - name: Check for changes
      id: changes
      run: |
        if git diff --quiet; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "No changes detected"
        else
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "Changes detected:"
          git diff --name-only
        fi
    
    - name: Mirror data to the data repo
      env:
        DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
      run: bash scripts/mirror-data-to-repo.sh

    - name: Create summary
      if: always()
      run: |
        echo "## 📊 Metadata Update Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
        echo "**Changes:** ${{ steps.changes.outputs.changed }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.changes.outputs.changed }}" == "true" ]; then
          echo "### 📝 Files Updated:" >> $GITHUB_STEP_SUMMARY
          git diff --name-only HEAD~1 | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
        else
          echo "### ✅ No updates needed" >> $GITHUB_STEP_SUMMARY
          echo "All metadata is up to date." >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: Notify on failure
      if: failure()
      run: |
        echo "## ❌ Metadata Update Failed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "The metadata update process encountered an error." >> $GITHUB_STEP_SUMMARY
        echo "Please check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY