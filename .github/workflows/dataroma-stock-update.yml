name: Dataroma Stock Update

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dataroma:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 yfinance

      - name: Seed public/data from the data repo
        run: bash scripts/seed-data-from-repo.sh

      - name: Crawl Dataroma Managers (Sector Rotation)
        run: |
          echo "Processing Sector Rotation Data..."
          python scripts/crawl_dataroma_managers.py

      - name: Crawl Dataroma Data
        run: |
          # Config-driven: batch_crawl_dataroma.py reads the enabled universe
          # from config/stocks.json (ADR-0012 single source of truth), so any
          # symbol added via the self-service flow is picked up automatically —
          # no hardcoded ticker list to maintain here.
          python scripts/batch_crawl_dataroma.py

      - name: Mirror data to the data repo
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: bash scripts/mirror-data-to-repo.sh
