name: Daily Market Data Update

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/daily-update.yml'
      - 'scripts/**'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Generate OHLCV Data
        run: |
          # Run the script to fetch Yahoo Finance data
          # This will read public/config/stocks.json and generate files in public/data/ohlcv
          python scripts/generate-real-ohlcv-yfinance.py --days=1095 --interval=1d

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: update daily market data (OHLCV)"
          file_pattern: 'public/data/ohlcv/*.json'
          branch: main
