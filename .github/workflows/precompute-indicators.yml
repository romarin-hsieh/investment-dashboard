name: Precompute Technical Indicators

on:
  schedule:
    # 美股收盤後1小時執行 (美東時間 17:00 = UTC 22:00)
    - cron: '0 22 * * 1-5'  # 週一到週五
  workflow_dispatch:  # 允許手動觸發

jobs:
  precompute:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    - name: Install Puppeteer Dependencies
      # Puppeteer might need some libs on linux if not using the installed chrome
      # But ubuntu-latest usually has them. Adding this just in case if fails.
      # Usually 'npm ci' installs puppeteer which brings a working chrome binary.
      run: |
        # Optional: verify
        echo "Dependencies installed" 
      
    - name: Create output directory
      run: mkdir -p public/data/technical-indicators
      
    - name: Run precomputation (Puppeteer)
      run: node scripts/precompute-with-browser.js
      timeout-minutes: 60
      env:
        NODE_ENV: production
        
    - name: Commit and push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add public/data/technical-indicators/
        if ! git diff --staged --quiet; then
          git commit -m "Update precomputed technical indicators $(date -u +%Y-%m-%d) [skip ci]"
          git push
        else
          echo "No changes to commit"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}