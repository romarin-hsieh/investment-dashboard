name: Tests

# Regression gate installed by WS-B PR-B1. Runs the Vitest suite on every
# push to main and every pull request. Keep fast; no matrix; no coverage
# upload unless explicitly added later.
#
# Test files live alongside source: src/**/*.test.{js,ts}
# To run locally: `npm test`

on:
  push:
    branches: [main]
  pull_request:

# If a new push lands on a PR, cancel the older run for that PR to save
# minutes. main pushes are never cancelled.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
