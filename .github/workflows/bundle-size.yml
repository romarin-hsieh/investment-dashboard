name: Bundle Size Delta

# Post (or update) a PR comment reporting per-chunk bundle-size deltas
# between the PR HEAD and the main baseline, AND enforce per-chunk
# performance budgets defined in `scripts/bundle-size-budgets.js`. Part of
# WS-D Bundle Analyzer Integration (PR-D2 added the delta path; PR-D3
# added budget enforcement + ADR-0007).
#
# How it works:
#   1. Dual-checkout: PR HEAD → ./head, main → ./base
#   2. Install deps + `npm run build:analyze` in each (writes stats.json)
#   3. Run scripts/bundle-size-delta.js head/stats.json → markdown report
#      (delta + budget-status section)
#   4. Upsert the PR comment (keyed by HTML marker so force-pushes don't spam)
#   5. Run scripts/bundle-size-delta.js --check-budgets head/stats.json,
#      which exits 2 if any chunk exceeds its gzip budget. THIS step's
#      failure fails the workflow — the comment from step 4 has already
#      posted, so the reviewer sees both the delta and the violation list.
#
# Skipped automatically when the PR only touches docs / workflows other
# than its own files (see `paths` filter).

on:
  pull_request:
    paths:
      - 'src/**'
      - 'index.html'
      - 'vite.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/bundle-size-delta.js'
      - '.github/workflows/bundle-size.yml'

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: bundle-size-${{ github.ref }}
  cancel-in-progress: true

jobs:
  size-delta:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          path: head

      - name: Checkout main baseline
        uses: actions/checkout@v4
        with:
          ref: main
          path: base

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            head/package-lock.json
            base/package-lock.json

      - name: Install deps (HEAD)
        working-directory: head
        run: npm ci

      - name: Build HEAD with analyzer
        working-directory: head
        run: npm run build:analyze
        env:
          NODE_ENV: production
          CI: 'true'

      - name: Install deps (base)
        working-directory: base
        run: npm ci

      - name: Build base with analyzer
        working-directory: base
        # main has `build:analyze` since PR-D1. Guarded fallback in case this
        # workflow runs on a PR whose base predates that merge.
        run: |
          if npm run | grep -q '  build:analyze'; then
            npm run build:analyze
          else
            echo "::notice::Base branch lacks build:analyze script — running with ANALYZE=1 directly"
            ANALYZE=1 npm run build
          fi
        env:
          NODE_ENV: production
          CI: 'true'

      - name: Verify stats files exist
        run: |
          test -f head/stats.json || { echo "::error::head/stats.json missing"; exit 1; }
          test -f base/stats.json || { echo "::error::base/stats.json missing"; exit 1; }
          echo "head stats: $(wc -c < head/stats.json) bytes"
          echo "base stats: $(wc -c < base/stats.json) bytes"

      - name: Compute delta report
        run: node head/scripts/bundle-size-delta.js base/stats.json head/stats.json > delta.md

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- bundle-size-delta-bot -->';
            const body = marker + '\n' + fs.readFileSync('delta.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body
              });
              core.info(`Updated existing comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body
              });
              core.info('Created new bundle-size comment');
            }

      # PR-D3 — runs AFTER the comment posts, so a failing budget still
      # surfaces the delta + violation list to reviewers. Exit code 2 from
      # the script fails this step (and the workflow); exit 0 means clean.
      - name: Enforce bundle budgets
        run: node head/scripts/bundle-size-delta.js --check-budgets head/stats.json
