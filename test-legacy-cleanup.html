<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舊架構清理驗證測試</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        .warning { background-color: #fff3cd; border-color: #ffeaa7; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        .test-result { margin: 10px 0; padding: 8px; border-radius: 3px; }
        .pass { background-color: #d4edda; color: #155724; }
        .fail { background-color: #f8d7da; color: #721c24; }
        button { padding: 8px 16px; margin: 5px; border: none; border-radius: 3px; cursor: pointer; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-warning { background-color: #ffc107; color: black; }
        .btn-danger { background-color: #dc3545; color: white; }
    </style>
</head>
<body>
    <h1>🧹 舊架構清理驗證測試</h1>
    
    <div class="test-section info">
        <h2>📋 測試目標</h2>
        <p>驗證所有組件已成功從舊架構遷移到新的統一配置架構：</p>
        <ul>
            <li>✅ stocksConfigService 正常運作</li>
            <li>🎯 stockOverviewOptimizer 使用新架構</li>
            <li>🎯 enhancedMetadataService 使用新架構</li>
            <li>🎯 效能和快取系統正常運作</li>
            <li>🎯 沒有舊架構殘留影響</li>
        </ul>
    </div>

    <div class="test-section">
        <h2>🔧 測試控制</h2>
        <button class="btn-primary" onclick="runAllTests()">執行所有測試</button>
        <button class="btn-success" onclick="testStocksConfigService()">測試統一配置服務</button>
        <button class="btn-success" onclick="testPerformanceOptimizer()">測試效能優化器</button>
        <button class="btn-success" onclick="testMetadataService()">測試 Metadata 服務</button>
        <button class="btn-warning" onclick="testCacheSystem()">測試快取系統</button>
        <button class="btn-danger" onclick="clearResults()">清除結果</button>
    </div>

    <div id="test-results"></div>

    <script type="module">
        let stocksConfig, stockOverviewOptimizer, enhancedMetadataService, performanceCache;
        
        // 動態載入所有服務
        try {
            const stocksConfigModule = await import('/src/utils/stocksConfigService.js');
            stocksConfig = stocksConfigModule.stocksConfig;
            
            const optimizerModule = await import('/src/utils/stockOverviewOptimizer.js');
            stockOverviewOptimizer = optimizerModule.stockOverviewOptimizer;
            
            const metadataModule = await import('/src/utils/enhancedMetadataService.js');
            enhancedMetadataService = metadataModule.enhancedMetadataService;
            
            const cacheModule = await import('/src/utils/performanceCache.js');
            performanceCache = cacheModule.performanceCache;
            
            console.log('✅ All services loaded successfully');
        } catch (error) {
            console.error('❌ Failed to load services:', error);
            addResult('fail', '無法載入服務: ' + error.message);
        }

        window.runAllTests = async function() {
            clearResults();
            addResult('info', '🚀 開始執行舊架構清理驗證測試...');
            
            await testStocksConfigService();
            await testPerformanceOptimizer();
            await testMetadataService();
            await testCacheSystem();
            await testArchitectureConsistency();
            
            addResult('info', '✅ 所有測試完成！');
        }

        window.testStocksConfigService = async function() {
            addResult('info', '🔧 測試統一配置服務...');
            
            if (!stocksConfig) {
                addResult('fail', '❌ stocksConfig 服務未載入');
                return;
            }
            
            try {
                // 測試基本功能
                const symbols = await stocksConfig.getEnabledSymbols();
                addResult('pass', `✅ getEnabledSymbols(): ${symbols.length} 個符號`);
                
                // 測試 RR 符號
                if (symbols.includes('RR')) {
                    addResult('pass', '✅ RR 符號存在於配置中');
                } else {
                    addResult('fail', '❌ RR 符號不存在於配置中');
                }
                
                // 測試統計信息
                const stats = await stocksConfig.getStats();
                addResult('pass', `✅ 配置統計: ${stats.total} 總數, ${stats.enabled} 啟用`);
                
                // 測試緩存功能
                const cacheInfo = stocksConfig.getCacheInfo();
                addResult('pass', `✅ 緩存狀態: ${cacheInfo.cached ? '已緩存' : '未緩存'}`);
                
            } catch (error) {
                addResult('fail', '❌ 統一配置服務測試失敗: ' + error.message);
            }
        }

        window.testPerformanceOptimizer = async function() {
            addResult('info', '⚡ 測試效能優化器...');
            
            if (!stockOverviewOptimizer) {
                addResult('fail', '❌ stockOverviewOptimizer 服務未載入');
                return;
            }
            
            try {
                // 測試載入建議
                const recommendations = stockOverviewOptimizer.getLoadingRecommendations();
                addResult('pass', `✅ 載入建議: ${recommendations.length} 個建議`);
                
                // 測試效能報告
                const report = stockOverviewOptimizer.generatePerformanceReport();
                addResult('pass', `✅ 效能報告生成成功`);
                addResult('info', `   快取統計: ${JSON.stringify(report.cacheStats)}`);
                
                // 測試智能快取管理
                stockOverviewOptimizer.manageCacheIntelligently();
                addResult('pass', '✅ 智能快取管理執行成功');
                
                // 測試預載入功能 (不實際執行，只檢查方法存在)
                if (typeof stockOverviewOptimizer.preloadCriticalData === 'function') {
                    addResult('pass', '✅ 預載入功能可用');
                } else {
                    addResult('fail', '❌ 預載入功能不可用');
                }
                
            } catch (error) {
                addResult('fail', '❌ 效能優化器測試失敗: ' + error.message);
            }
        }

        window.testMetadataService = async function() {
            addResult('info', '📊 測試 Metadata 服務...');
            
            if (!enhancedMetadataService) {
                addResult('fail', '❌ enhancedMetadataService 服務未載入');
                return;
            }
            
            try {
                // 測試服務狀態
                const status = await enhancedMetadataService.getUpdateStatus();
                addResult('pass', `✅ Metadata 服務狀態: ${status.isHealthy ? '健康' : '異常'}`);
                
                // 測試統計信息
                const stats = await enhancedMetadataService.getDetailedStats();
                addResult('pass', `✅ 詳細統計: ${stats.totalSymbols} 個符號`);
                
                // 測試單個符號 metadata (使用 RR)
                const rrMetadata = await enhancedMetadataService.getSymbolMetadata('RR');
                if (rrMetadata) {
                    addResult('pass', `✅ RR Metadata: ${rrMetadata.sector}/${rrMetadata.industry}`);
                } else {
                    addResult('fail', '❌ 無法獲取 RR Metadata');
                }
                
            } catch (error) {
                addResult('fail', '❌ Metadata 服務測試失敗: ' + error.message);
            }
        }

        window.testCacheSystem = async function() {
            addResult('info', '💾 測試快取系統...');
            
            if (!performanceCache) {
                addResult('fail', '❌ performanceCache 服務未載入');
                return;
            }
            
            try {
                // 測試基本快取功能
                const testKey = 'test_cache_key';
                const testData = { test: 'data', timestamp: Date.now() };
                
                performanceCache.set(testKey, testData, 60000); // 1分鐘 TTL
                const retrieved = performanceCache.get(testKey);
                
                if (retrieved && retrieved.test === 'data') {
                    addResult('pass', '✅ 基本快取功能正常');
                } else {
                    addResult('fail', '❌ 基本快取功能異常');
                }
                
                // 測試快取統計
                const stats = performanceCache.getStats();
                addResult('pass', `✅ 快取統計: 記憶體 ${stats.memoryCache}, 本地存儲 ${stats.localStorage}`);
                
                // 測試預載入功能
                const preloadResult = await performanceCache.preload(
                    'test_preload',
                    () => Promise.resolve({ preloaded: true }),
                    30000
                );
                
                if (preloadResult && preloadResult.preloaded) {
                    addResult('pass', '✅ 預載入功能正常');
                } else {
                    addResult('fail', '❌ 預載入功能異常');
                }
                
                // 清理測試數據
                performanceCache.delete(testKey);
                performanceCache.delete('test_preload');
                
            } catch (error) {
                addResult('fail', '❌ 快取系統測試失敗: ' + error.message);
            }
        }

        window.testArchitectureConsistency = async function() {
            addResult('info', '🏗️ 測試架構一致性...');
            
            try {
                // 檢查所有服務是否使用相同的數據源
                const configSymbols = await stocksConfig.getEnabledSymbols();
                
                // 檢查配置文件是否可訪問
                const configResponse = await fetch('/config/stocks.json?t=' + Date.now());
                if (configResponse.ok) {
                    const configData = await configResponse.json();
                    const fileSymbols = configData.stocks.filter(s => s.enabled).map(s => s.symbol);
                    
                    if (configSymbols.length === fileSymbols.length) {
                        addResult('pass', '✅ 服務與配置文件數據一致');
                    } else {
                        addResult('fail', `❌ 數據不一致: 服務(${configSymbols.length}) vs 文件(${fileSymbols.length})`);
                    }
                } else {
                    addResult('fail', '❌ 無法訪問配置文件');
                }
                
                // 檢查是否還有舊架構殘留
                try {
                    // 嘗試載入舊的 symbolsConfig (應該不會被使用)
                    const oldConfigModule = await import('/src/utils/symbolsConfig.js');
                    addResult('warning', '⚠️ 舊的 symbolsConfig.js 文件仍存在 (可能需要清理)');
                } catch (error) {
                    addResult('pass', '✅ 舊的 symbolsConfig.js 已移除或不可訪問');
                }
                
                // 檢查 universe.json 是否仍被使用
                try {
                    const universeResponse = await fetch('/config/universe.json?t=' + Date.now());
                    if (universeResponse.ok) {
                        addResult('warning', '⚠️ universe.json 仍存在 (作為 fallback 是正常的)');
                    } else {
                        addResult('info', 'ℹ️ universe.json 不可訪問 (正常)');
                    }
                } catch (error) {
                    addResult('info', 'ℹ️ universe.json 訪問測試完成');
                }
                
            } catch (error) {
                addResult('fail', '❌ 架構一致性測試失敗: ' + error.message);
            }
        }

        window.clearResults = function() {
            document.getElementById('test-results').innerHTML = '';
        }

        function addResult(type, message) {
            const resultsDiv = document.getElementById('test-results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `test-result ${type}`;
            resultDiv.innerHTML = `<pre>${message}</pre>`;
            resultsDiv.appendChild(resultDiv);
            
            // 自動滾動到底部
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        }

        // 頁面載入時自動執行基本測試
        window.addEventListener('load', function() {
            addResult('info', '🧹 舊架構清理驗證測試工具已載入');
            addResult('info', '點擊 "執行所有測試" 開始完整驗證');
        });
    </script>
</body>
</html>
