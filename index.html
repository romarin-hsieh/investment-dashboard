<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="POC Investment Information Dashboard - Track macro indicators and stock portfolio"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; connect-src 'self' https:; frame-src https:;"
    />
    <title>Investment Dashboard</title>

    <!--
      WS-C PR-C4: Prefetch hints for data files that almost every page-load needs.
      GitHub Pages sends Cache-Control: max-age=600 by default and doesn't let us
      override it (see docs/architecture/adr/0006-static-data-caching-on-github-pages.md)
      so we use browser-level prefetch to get the data into the HTTP cache during
      idle. By the time the SPA's fetch() fires for these URLs, the response is
      usually served from cache — zero network round-trip.

      The `as="fetch"` + `crossorigin` combo makes the prefetch eligible for reuse
      by the SPA's later fetch() call (same Fetch destination + credentials mode).
    -->
    <link rel="prefetch" as="fetch" crossorigin href="/investment-dashboard/data/technical-indicators/latest_index.json" />
    <link rel="prefetch" as="fetch" crossorigin href="/investment-dashboard/data/technical-indicators/latest_all.json" />
    <link rel="prefetch" as="fetch" crossorigin href="/investment-dashboard/data/dashboard_status.json" />

    <!-- Microsoft Clarity -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "uqs9axfxt3");
    </script>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4ME39R5VDH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4ME39R5VDH');
    </script>
    
    <script>
      // GitHub Pages SPA routing support
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?')
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          )
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
